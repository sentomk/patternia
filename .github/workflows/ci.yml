name: patternia CI

on:
  push:
    branches: [main, dev-main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, dev-main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPTN_BUILD_TESTS=ON \
            -DPTN_BUILD_BENCHMARKS=OFF \
            -DPTN_SKIP_COMPILER_CHECK=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload test log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: build/Testing/Temporary/LastTest.log

  coverage:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DPTN_BUILD_TESTS=ON \
            -DPTN_BUILD_BENCHMARKS=OFF \
            -DPTN_SKIP_COMPILER_CHECK=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

  benchmark:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPTN_BUILD_TESTS=OFF \
            -DPTN_BUILD_BENCHMARKS=ON \
            -DPTN_SKIP_COMPILER_CHECK=ON

      - name: Build
        run: cmake --build build --target ptn_bench --parallel

      - name: Run benchmarks
        run: |
          mkdir -p bench_results
          build/bench/ptn_bench \
            --benchmark_filter="_VariantMixed/|_ProtocolRouter/|_CommandParser/|_LiteralMatch/|_PacketMixed/" \
            --benchmark_format=json \
            > bench_results/ptn_bench.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench_results/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install plotting dependency
        run: python -m pip install matplotlib

      - name: Generate benchmark chart
        run: |
          python scripts/bench_single_report.py \
            --input bench_results/ptn_bench.json \
            --include "_VariantMixed$|_ProtocolRouter$|_CommandParser$|_LiteralMatch$|_PacketMixed$" \
            --outdir docs/assets/bench \
            --prefix latest \
            --title "Patternia vs Standard C++"

      - name: Commit benchmark chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/bench/latest.png docs/assets/bench/latest.md docs/assets/bench/latest.csv
          git diff --cached --quiet || git commit -m "ci: update benchmark summary chart"
          git push
